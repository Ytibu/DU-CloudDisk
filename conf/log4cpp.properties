# log4cpp 配置文件 - CloudDisk 项目

# 根类别配置：同时输出到文件和控制台
log4cpp.rootCategory=DEBUG, RollingFileAppender, ConsoleAppender

# 文件输出 Appender (使用 RollingFileAppender 实现日志轮转)
log4cpp.appender.RollingFileAppender=RollingFileAppender
log4cpp.appender.RollingFileAppender.fileName=log/cloudDisk.log
log4cpp.appender.RollingFileAppender.maxFileSize=10485760
log4cpp.appender.RollingFileAppender.maxBackupIndex=10
log4cpp.appender.RollingFileAppender.append=true
log4cpp.appender.RollingFileAppender.layout=PatternLayout
log4cpp.appender.RollingFileAppender.layout.ConversionPattern=%d{%Y-%m-%d %H:%M:%S.%l} [%p] %c - %m%n

# 终端输出 Appender
log4cpp.appender.ConsoleAppender=ConsoleAppender
log4cpp.appender.ConsoleAppender.layout=PatternLayout
log4cpp.appender.ConsoleAppender.layout.ConversionPattern=%d{%H:%M:%S.%l} [%p] %c - %m%n
